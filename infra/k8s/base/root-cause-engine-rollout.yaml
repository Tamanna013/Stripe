apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: root-cause-engine
spec:
  replicas: 5
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause: {duration: 300}
        - analysis:
            templates:
              - templateName: error-rate-and-latency-check
        - setWeight: 25
        - pause: {duration: 300}
        - analysis:
            templates:
              - templateName: error-rate-and-latency-check
        - setWeight: 50
        - pause: {duration: 300}
        - setWeight: 100
  selector:
    matchLabels:
      app: root-cause-engine
  template:
    metadata:
      labels:
        app: root-cause-engine
    spec:
      containers:
        - name: root-cause-engine
          image: flowguard/root-cause-engine:latest

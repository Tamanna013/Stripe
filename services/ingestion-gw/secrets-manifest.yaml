apiVersion: secrets.flowguard.internal/v1
kind: SecretsManifest
metadata:
  name: ingestion-gw-secrets
spec:
  service: ingestion-gw
  environment: production
  required_secrets:
    - name: redis-credentials
      path: secret/data/flowguard/prod/redis
      keys:
        - REDIS_PASSWORD
    - name: msk-client-tls
      path: secret/data/flowguard/prod/kafka-tls
      keys:
        - KAFKA_CERT
        - KAFKA_KEY
